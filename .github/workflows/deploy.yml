name: Deploy Slidev to GitHub Pages

on:
  # main への push で自動公開
  push:
    branches: [main]
  # 手動実行も可能
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに（進行中のデプロイはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # base パスはリポジトリ名を自動注入（ハードコードしない）
      # 例: リポジトリが owner/my-repo なら base = /my-repo/
      - name: Build
        run: npm run build -- --base /${{ github.event.repository.name }}/ --out dist

      - name: Verify Reader View artifact
        run: |
          test -f dist/reader/index.html
          test -f dist/reader/reader-data.json
          ! grep -qi '<iframe' dist/reader/index.html
          test -f dist/reader/reader-manifest.json
          test ! -d dist/reader/images
          test -d dist/reader/thumbnails
          node -e "const fs=require('node:fs'),path=require('node:path'); const d=JSON.parse(fs.readFileSync('dist/reader/reader-data.json')); if(d.version!==2||d.slides?.length!==31||d.slides.some((s,i)=>s.number!==i+1||!s.thumbnail||!fs.existsSync(path.join('dist/reader',s.thumbnail)))) process.exit(1)"
          node -e "const fs=require('node:fs'); const m=JSON.parse(fs.readFileSync('dist/reader/reader-manifest.json')); if(m.source!=='slides.md'||m.slides?.length!==31||m.slides.some((s,i)=>s.number!==i+1||!s.note||!s.type||!s.variant)) process.exit(1)"
          test -f dist/reader-legacy/index.html
          test -f dist/reader-legacy/reader.js
          test -f dist/reader-pilot/index.html
          test -f dist/reader-pilot/coverage-report.json

      # Pilotの件数・構成契約は専用QAへ集約し、workflowとの二重管理を避ける。
      - name: Verify Reader pilot
        run: npm run qa:reader-pilot -- --base /${{ github.event.repository.name }}/ --out dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
